    <script>
        var txt = [ "I'm a self taught programmer with a couple of years of experience.",
                    "I am compassionate into building web applications and solving complex problems.",
                    "I'm always eager to learn new technologies and improve my skills." ];
        var speed = 70;
        var textIndex = 0;
        var i = 0;
        var displayDuration = 2000;
        
        function typeWriter() {
            if (i < txt[textIndex].length) {
                document.getElementById("txt").innerHTML += txt[textIndex].charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                // Wait for a couple of seconds before starting the next text
                setTimeout(eraseText, displayDuration);
            }      
        };
        function eraseText() {
            if (i > 0) {
                document.getElementById("txt").innerHTML = txt[textIndex].substring(0, i - 1);
                i--;
                setTimeout(eraseText, speed / 2); // Erase at half the speed of typing
            } else {
                // Move to the next text
                textIndex = (textIndex + 1) % txt.length;
                setTimeout(typeWriter, speed); // Start typing the next text
            }
        };

    typeWriter();
    </script>
